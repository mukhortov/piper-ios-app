[tools]
tuist = "4.153.0"
swiftlint = "latest"

[tasks.install]
description = "Resolve and fetch SPM dependencies (Package.swift)"
run = "tuist install"

[tasks.generate]
description = "Generates Xcode project (run install first if deps changed)"
run = """
   tuist version
   tuist install
   tuist generate --no-open --verbose
"""

[tasks.edit]
description = "Generates xcode project"
run = """
   tuist edit
"""

[tasks.lint]
description = "Runs linters"
env = { SRCROOT = "{{config_root}}" }
usage = '''
flag "--reporter <reporter>" help="Reporter type" default="xcode" { choices "xcode" "github-actions-logging" }
flag "--fix" help="Attempt to fix lint issues"
'''
run = '''
./PiperApp/BuildScripts/Linting/SwiftLint/RunSwiftLint.sh
'''

[tasks.build]
description = "Build for Simulator (default) or Device with a build number"
usage = '''
arg "<build_number>" help="The CI build number"
arg "[target]" help="Build target" default="simulator" { choices "simulator" "device" }
'''
run = '''
# usage_target defaults to "simulator"
# usage_build_number is the second positional argument

if [ "$usage_target" = "device" ]; then
   ./PiperApp/BuildScripts/Scripts/BuildDevice.sh "$usage_build_number"
else
  ./PiperApp/BuildScripts/Scripts/BuildSimulator.sh "$usage_build_number"
fi
'''
