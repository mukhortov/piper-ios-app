version: 2
updates:
  # GitHub Actions in .github/workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"

  # Swift packages: root Package.swift (Tuist XcodeProj-based SPM); Project.swift references via .external()
  - package-ecosystem: "swift"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "swift"
    groups:
      swift-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
